<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅行攻略</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-secondary: #f5f5f7;
      --label: #1d1d1f;
      --label-secondary: #6e6e73;
      --label-tertiary: #aeaeb2;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --separator: rgba(0,0,0,0.08);
      --radius-card: 18px;
      --radius-inner: 12px;
      --shadow-card: 0 2px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --surface: #1c1c1e;
        --surface-secondary: #2c2c2e;
        --label: #f5f5f7;
        --label-secondary: #aeaeb2;
        --label-tertiary: #636366;
        --separator: rgba(255,255,255,0.1);
        --shadow-card: 0 2px 20px rgba(0,0,0,0.4);
        --shadow-hover: 0 8px 32px rgba(0,0,0,0.6);
      }
    }

    html { font-family: var(--font); background: var(--bg); color: var(--label); -webkit-font-smoothing: antialiased; }

    body { min-height: 100vh; }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,245,247,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--separator);
    }
    @media (prefers-color-scheme: dark) {
      .nav { background: rgba(0,0,0,0.85); }
    }
    .nav-inner {
      max-width: 980px; margin: 0 auto;
      padding: 0 24px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; color: var(--label); text-decoration: none; }
    .nav-subtitle { font-size: 13px; color: var(--label-secondary); }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 24px 56px;
    }
    .hero-eyebrow {
      font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px;
    }
    .hero-title {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--label);
      margin-bottom: 16px;
    }
    .hero-subtitle {
      font-size: 19px; font-weight: 400;
      color: var(--label-secondary);
      max-width: 480px; margin: 0 auto;
      line-height: 1.5;
    }

    /* Main content */
    .main { max-width: 980px; margin: 0 auto; padding: 0 24px 80px; }

    /* Section header */
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }

    /* Trip grid */
    .trips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* Trip card */
    .trip-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
      display: flex; flex-direction: column;
    }
    .trip-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }
    .trip-card-cover {
      height: 160px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative; overflow: hidden;
      flex-shrink: 0;
    }
    .trip-card-cover-emoji {
      position: absolute; bottom: 16px; left: 20px;
      font-size: 40px; line-height: 1;
    }
    .trip-card-body { padding: 20px; flex: 1; }
    .trip-card-destination {
      font-size: 19px; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .trip-card-date {
      font-size: 13px; color: var(--label-secondary);
      margin-bottom: 12px;
    }
    .trip-card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px; font-weight: 500;
      background: var(--surface-secondary);
      color: var(--label-secondary);
      padding: 3px 10px; border-radius: 100px;
    }
    .trip-card-footer {
      padding: 0 20px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .trip-card-cta {
      font-size: 14px; font-weight: 500; color: var(--accent);
      display: flex; align-items: center; gap: 4px;
    }
    .trip-card-cta svg { width: 14px; height: 14px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
    }
    .empty-icon { font-size: 56px; margin-bottom: 20px; }
    .empty-title {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    .empty-desc {
      font-size: 16px; color: var(--label-secondary);
      max-width: 360px; margin: 0 auto 28px; line-height: 1.6;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      font-size: 15px; font-weight: 500;
      padding: 12px 24px; border-radius: 980px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-hover); }

    /* Footer */
    .footer {
      border-top: 1px solid var(--separator);
      padding: 32px 24px;
      text-align: center;
    }
    .footer-inner { max-width: 980px; margin: 0 auto; }
    .footer p { font-size: 13px; color: var(--label-tertiary); line-height: 1.8; }

    /* Responsive */
    @media (max-width: 600px) {
      .hero { padding: 48px 20px 40px; }
      .hero-subtitle { font-size: 16px; }
      .nav-subtitle { display: none; }
      .trips-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">✈ x-travel</a>
      <span class="nav-subtitle">旅行攻略合集</span>
    </div>
  </nav>

  <section class="hero">
    <p class="hero-eyebrow">Travel Guides</p>
    <h1 class="hero-title">旅行攻略</h1>
    <p class="hero-subtitle">每一次出发，都值得被认真记录。</p>
  </section>

  <main class="main">

    <!-- ===== TRIPS SECTION ===== -->
    <div class="section-header">
      <h2 class="section-title">所有攻略</h2>
    </div>

    <!-- TRIPS LIST START -->
    <!-- 当有旅行攻略时，将下面的 empty-state 替换为 trip card，格式如下：

    <div class="trips-grid">
      <a class="trip-card" href="trips/2025-05-tokyo/">
        <div class="trip-card-cover" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
          <span class="trip-card-cover-emoji">🗼</span>
        </div>
        <div class="trip-card-body">
          <div class="trip-card-destination">东京</div>
          <div class="trip-card-date">2025年5月1日 — 5月7日 · 7天</div>
          <div class="trip-card-tags">
            <span class="tag">美食之旅</span>
            <span class="tag">文化探索</span>
            <span class="tag">2人</span>
          </div>
        </div>
        <div class="trip-card-footer">
          <span class="trip-card-cta">
            查看攻略
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
          </span>
        </div>
      </a>
    </div>

    -->

    <!-- Empty state - 当没有旅行攻略时显示 -->
    <div class="empty-state">
      <div class="empty-icon">🌍</div>
      <h3 class="empty-title">还没有旅行攻略</h3>
      <p class="empty-desc">
        复制 <code>_templates/trip-info.md</code> 模板，填写旅行信息，<br>让 AI 帮你生成第一份精美攻略。
      </p>
      <a class="btn" href="https://github.com" target="_blank">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        前往 GitHub 仓库
      </a>
    </div>
    <!-- TRIPS LIST END -->

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>由 AI 辅助生成 · Powered by <a href="https://github.com" style="color:var(--label-secondary)">x-travel</a></p>
      <p>每次旅行，都是一次新的故事。</p>
    </div>
  </footer>

</body>
</html>
